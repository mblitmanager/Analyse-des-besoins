services:
  backend:
    build: ./projet-app/backend
    container_name: aopia_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      FRONTEND_URL: "https://nsconseil.mbl-service.com"
      DATABASE_URL: "postgresql://postgres:root@172.17.0.1:5432/wizzylearn"
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    ports:
      - "3001:3001"

  frontend:
    build: ./projet-app/frontend
    container_name: aopia_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
