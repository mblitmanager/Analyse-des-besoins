name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'projet-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'projet-app/**'

env:
  NODE_VERSION: '20'

jobs:
  # ─── BACKEND: Lint, Build, Test ───
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./projet-app/backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: wizilearn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: projet-app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/wizilearn_test
          JWT_SECRET: ci-test-secret
          MAIL_HOST: localhost
          MAIL_PORT: 1025

      - name: E2E Tests
        run: npm run test:e2e -- --passWithNoTests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/wizilearn_test
          JWT_SECRET: ci-test-secret
          MAIL_HOST: localhost
          MAIL_PORT: 1025

  # ─── FRONTEND: Build ───
  frontend:
    name: Frontend (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./projet-app/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: projet-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: projet-app/frontend/dist
          retention-days: 3

  # ─── DEPLOY: Only on push to main ───
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: projet-app/backend/package-lock.json

      - name: Build backend
        working-directory: ./projet-app/backend
        run: |
          npm ci
          npm run build

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - name: Prepare deployment artifacts
        run: |
          mkdir -p deploy
          tar -czf deploy/backend.tar.gz -C projet-app/backend dist package.json package-lock.json
          tar -czf deploy/frontend.tar.gz -C ./frontend-dist .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          rsync -az -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }}" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/wizilearn-deploy/

      - name: Deploy on VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/analyse/projet-app' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            
            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/analyse/projet-app}"
            
            echo "→ Deploying frontend..."
            sudo mkdir -p $DEPLOY_PATH/frontend/dist
            sudo rm -rf $DEPLOY_PATH/frontend/dist/*
            cd /tmp/wizilearn-deploy
            tar -xzf frontend.tar.gz -C $DEPLOY_PATH/frontend/dist/
            sudo chown -R www-data:www-data $DEPLOY_PATH/frontend/dist
            
            echo "→ Deploying backend..."
            sudo mkdir -p $DEPLOY_PATH/backend
            tar -xzf backend.tar.gz -C $DEPLOY_PATH/backend/
            cd $DEPLOY_PATH/backend
            sudo npm ci --omit=dev
            
            echo "→ Restarting services..."
            if pm2 describe aopia-backend >/dev/null 2>&1; then
              pm2 restart aopia-backend --update-env
            else
              pm2 start dist/main.js --name aopia-backend
            fi
            pm2 save
            
            echo "→ Reloading web server..."
            sudo systemctl reload nginx 2>/dev/null || sudo systemctl reload apache2 2>/dev/null || true
            
            echo "→ Cleanup..."
            rm -rf /tmp/wizilearn-deploy
            
            echo "✓ Deployment complete!"
          DEPLOY_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
