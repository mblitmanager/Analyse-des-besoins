<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOPIA Prévention – Formations CSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f4f7fb 0%, #e8f1ff 100%);
            font-family: 'Open Sans', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        
        .image-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(11, 110, 174, 0.15);
            overflow: hidden;
        }
        
        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img src="prevention.png" alt="AOPIA Prévention – Formations CSE">
        </div>
    </div>
</body>
</html>
